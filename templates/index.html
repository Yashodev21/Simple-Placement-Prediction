<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🎯 Placement Predictor</h1>

    <form action="/predict" method="POST" class="form">

        <div class="grid">
            <input type="number" name="Student_ID" placeholder="Student ID" required>
            <input type="number" name="Age" placeholder="Age" required>

            <select name="Gender">
                <option disabled selected>Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <select name="Degree">
                <option disabled selected>Degree</option>
                <option>B.Tech</option>
                <option>BCA</option>
                <option>B.Sc</option>
                <option>MCA</option>
            </select>

            <select name="Branch">
                <option disabled selected>Branch</option>
                <option>CSE</option>
                <option>ECE</option>
                <option>ME</option>
            </select>

            <input type="number" step="0.1" name="CGPA" placeholder="CGPA">
            <input type="number" name="Internships" placeholder="Internships">
            <input type="number" name="Projects" placeholder="Projects">
            <input type="number" name="Coding_Skills" placeholder="Coding Skills (1-10)">
            <input type="number" name="Communication_Skills" placeholder="Communication Skills (1-10)">
            <input type="number" name="Aptitude_Test_Score" placeholder="Aptitude Score">
            <input type="number" name="Soft_Skills_Rating" placeholder="Soft Skills">
            <input type="number" name="Certifications" placeholder="Certifications">
            <input type="number" name="Backlogs" placeholder="Backlogs">
        </div>

        <button type="submit">🚀 Predict Placement</button>

    </form>
</div>

</body>
</html>
